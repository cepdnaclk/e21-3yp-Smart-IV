[platformio]
default_envs = receiver_esp32s3_n16r8_usb_cdc

; Receiver board: ESP32-S3-N16R8.
; Start with the USB-CDC environment below. If your board uses a separate UART/CH340
; COM port and Serial Monitor stays blank, switch default_envs to receiver_esp32s3_n16r8_uart.

[env:receiver_esp32s3_n16r8_usb_cdc]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DRECEIVER_DEBUG=0

[env:receiver_esp32s3_n16r8_uart]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DRECEIVER_DEBUG=0
